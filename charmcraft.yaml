name: prometheus-scrape-target-k8s
type: charm
summary: An integrator charm for external metrics endpoints.
description: |
  Prometheus Scrape Target K8s is a workloadless Juju charm that enables Prometheus to scrape
  metrics from endpoints outside of Juju models — such as bare-metal servers, VMs, or external
  services. It is a complementary charm to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  Target addresses are specified via Juju config and automatically registered as Prometheus
  scrape jobs through the metrics-endpoint relation. Typically, one or more scrape-target
  charms are related to a single scrape-config charm, which allows operators to override
  scrape options — such as interval, timeout, and relabeling rules — before forwarding the
  jobs to Prometheus.

  Key features:

  - Register external metrics endpoints as Prometheus scrape targets without requiring a
    charmed operator on the target.
  - Configurable job name, metrics path, scheme, labels, and HTTP parameters.
  - Basic authentication and TLS support for secure scraping of external endpoints.
  - Workloadless charm — no additional containers or resources required.

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version

provides:
  metrics-endpoint:
    interface: prometheus_scrape

config:
  options:
    targets:
      type: string
      description: >
        Comma separated list of external scrape targets, e.g., "192.168.5.2:7000,192.168.5.3:7000"; 
        do not add the protocol!
    labels:
      type: string
      description: >
        Comma separated list of label:value pairs.
    job_name:
      type: string
      default: "external_jobs"
      description: >
        Name of external scrape configuration jobs.
    metrics_path:
      type: string
      description: >
        Metrics path for external jobs.
    scheme:
      type: string
      description: >
        Configures the protocol scheme prometheus uses for requests.
    params:
      description: >
        Configures optional HTTP URL parameters as a key-value collection.
      type: string
    basic_auth:
      type: string
      description: >
        Sets the Authorization header prometheus uses on every scrape request.
        The expected format is username:password.
    tls_config_key_file:
      type: string
      description: >
        Certificate key to request API server access with.
    tls_config_cert_file:
      type: string
      description: >
        Certificate to request API server access with.
    tls_config_server_name:
      type: string
      description: >
        Server name to access the API server with. Only relevant if the cert 
        is not including it's name in the SANs.
    tls_config_ca_file:
      type: string
      description: >
        CA certificate to validate API server certificate with.
    tls_config_insecure_skip_verify:
      type: boolean
      description: >
        Disable validation of the server certificate.
